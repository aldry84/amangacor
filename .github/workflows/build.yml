name: Build and Release

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "*.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: |
          rm -f $GITHUB_WORKSPACE/builds/*.cs3 || true
          rm -f $GITHUB_WORKSPACE/builds/*.jar || true
          rm -f $GITHUB_WORKSPACE/builds/plugins.json || true

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Cloudstream plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew clean
          ./gradlew make
          ./gradlew makePluginsJson
          ./gradlew ensureJarCompatibility
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds || true
          cp **/build/*.jar $GITHUB_WORKSPACE/builds || true
          cp build/plugins.json $GITHUB_WORKSPACE/builds || true

      - name: Push new builds to builds branch
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit --amend -m "Auto Build $GITHUB_SHA" || exit 0
          git push --force

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Auto Build #${{ github.run_number }}"
          body: |
            🔥 **Automatic build from commit:** `${{ github.sha }}`
            
            🧱 Files:
            - `.cs3` (Cloudstream plugin)
            - `.jar` (Java library)
            
            _Generated automatically by GitHub Actions._
          files: |
            builds/*.cs3
            builds/*.jar
            builds/plugins.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
